<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1024px;
      height: 500px;
      overflow: hidden;
      background: #3182F6;
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    }

    .container {
      width: 1024px;
      height: 500px;
      background: linear-gradient(135deg, #2563EB 0%, #3B82F6 50%, #60A5FA 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 80px;
      position: relative;
      overflow: hidden;
    }

    /* 배경 장식 원 */
    .circle1 {
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      top: -80px;
      right: 280px;
    }
    .circle2 {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      bottom: -60px;
      left: 200px;
    }
    .circle3 {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      top: 40px;
      left: 420px;
    }

    /* 왼쪽 텍스트 영역 */
    .text-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 1;
    }

    .app-name {
      font-size: 52px;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1.1;
      letter-spacing: -1px;
    }

    .tagline {
      font-size: 22px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      line-height: 1.4;
    }

    .features {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .feature-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.7);
      flex-shrink: 0;
    }

    .feature-text {
      font-size: 16px;
      color: rgba(255,255,255,0.85);
      font-weight: 500;
    }

    /* 오른쪽 아이콘 영역 */
    .icon-area {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .icon-wrapper {
      width: 260px;
      height: 260px;
      border-radius: 56px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.25), 0 8px 20px rgba(0,0,0,0.15);
    }

    .icon-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="circle1"></div>
    <div class="circle2"></div>
    <div class="circle3"></div>

    <div class="text-area">
      <div class="app-name">냉장고 박사</div>
      <div class="tagline">이제 냉장고 관리도<br>AI로 스마트하게!</div>
      <div class="features">
        <div class="feature-item">
          <div class="feature-dot"></div>
          <div class="feature-text">AI 재료 자동 등록 · 유통기한 알림</div>
        </div>
        <div class="feature-item">
          <div class="feature-dot"></div>
          <div class="feature-text">내 냉장고 맞춤 레시피 추천</div>
        </div>
        <div class="feature-item">
          <div class="feature-dot"></div>
          <div class="feature-text">절약 리포트 · 가족 냉장고 공유</div>
        </div>
      </div>
    </div>

    <div class="icon-area">
      <div class="icon-wrapper">
        <img src="../assets/icon.png" alt="냉장고 박사 아이콘" />
      </div>
    </div>
  </div>
</body>
</html>
