<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>앱 아이콘 미리보기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #F0F0F0;
      font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif;
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 48px;
    }

    h2 {
      font-size: 13px;
      color: #666;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .section {
      display: flex;
      align-items: flex-end;
      gap: 40px;
      flex-wrap: wrap;
    }

    .icon-case {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .label {
      font-size: 12px;
      color: #888;
      text-align: center;
    }

    /* 공통: 아이콘 이미지 */
    .icon-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── 1. Play Store (정사각형) ── */
    .play-store {
      width: 96px;
      height: 96px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }

    /* ── 2. Squircle (삼성/픽셀 기본) ── */
    .squircle {
      width: 96px;
      height: 96px;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }

    /* ── 3. Circle ── */
    .circle {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }

    /* ── 4. 어댑티브 아이콘 시뮬레이션 (66% safe zone) ── */
    /* 컨테이너: 전체 108dp 기준, foreground는 108/66 = ~163% 크기로 표시됨 */
    .adaptive-wrapper {
      position: relative;
      width: 96px;
      height: 96px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .adaptive-wrapper.squircle { border-radius: 28px; }
    .adaptive-wrapper.circle   { border-radius: 50%; }

    /* 배경 레이어 */
    .adaptive-bg {
      position: absolute;
      inset: 0;
      background: #C8E6F5;
    }

    /* foreground: 108dp 기준으로 foreground 전체가 들어가므로
       실제 표시 크기는 96px × (108/66) ≈ 157% */
    .adaptive-fg {
      position: absolute;
      width: 163%;
      height: 163%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }

    /* safe zone 가이드라인 오버레이 */
    .safe-zone-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .safe-zone-overlay .safe-box {
      position: absolute;
      top: 17%;
      left: 17%;
      width: 66%;
      height: 66%;
      border: 1.5px dashed rgba(255, 80, 80, 0.7);
    }
    .safe-zone-overlay .safe-label {
      position: absolute;
      top: 4px;
      left: 4px;
      font-size: 7px;
      color: rgba(255,80,80,0.9);
      background: rgba(255,255,255,0.6);
      padding: 1px 3px;
      border-radius: 2px;
    }

    /* 홈화면 아이콘 느낌 */
    .homescreen {
      background: #1C1C1E;
      border-radius: 20px;
      padding: 24px 32px;
      display: flex;
      gap: 24px;
      align-items: flex-end;
    }
    .app-label {
      font-size: 10px;
      color: #FFF;
      text-align: center;
      margin-top: 6px;
    }
  </style>
</head>
<body>

  <!-- Play Store -->
  <div>
    <h2>Play Store 등록 아이콘</h2>
    <div class="section">
      <div class="icon-case">
        <div class="play-store">
          <img class="icon-img" src="../assets/icon.png" />
        </div>
        <div class="label">96px (정사각형)</div>
      </div>
    </div>
  </div>

  <!-- 일반 마스크 -->
  <div>
    <h2>앱 런처 아이콘 (마스크 적용)</h2>
    <div class="section">
      <div class="icon-case">
        <div class="squircle">
          <img class="icon-img" src="../assets/icon.png" />
        </div>
        <div class="label">Squircle<br>(삼성·픽셀 기본)</div>
      </div>
      <div class="icon-case">
        <div class="circle">
          <img class="icon-img" src="../assets/icon.png" />
        </div>
        <div class="label">Circle<br>(일부 런처)</div>
      </div>
    </div>
  </div>

  <!-- 어댑티브 아이콘 safe zone 시뮬레이션 -->
  <div>
    <h2>어댑티브 아이콘 (Foreground 66% safe zone 시뮬레이션)</h2>
    <div class="section">
      <div class="icon-case">
        <div class="adaptive-wrapper squircle">
          <div class="adaptive-bg"></div>
          <img class="adaptive-fg" src="../assets/android-icon-foreground.png" />
          <div class="safe-zone-overlay">
            <div class="safe-box"></div>
            <div class="safe-label">safe zone</div>
          </div>
        </div>
        <div class="label">Squircle + safe zone 표시</div>
      </div>
      <div class="icon-case">
        <div class="adaptive-wrapper circle">
          <div class="adaptive-bg"></div>
          <img class="adaptive-fg" src="../assets/android-icon-foreground.png" />
        </div>
        <div class="label">Circle (safe zone 없이)</div>
      </div>
      <div class="icon-case">
        <div class="adaptive-wrapper squircle">
          <div class="adaptive-bg"></div>
          <img class="adaptive-fg" src="../assets/android-icon-foreground.png" />
        </div>
        <div class="label">Squircle (safe zone 없이)</div>
      </div>
    </div>
  </div>

  <!-- 홈화면 시뮬레이션 -->
  <div>
    <h2>홈화면 느낌</h2>
    <div class="homescreen">
      <div class="icon-case">
        <div class="squircle" style="width:72px;height:72px;">
          <img class="icon-img" src="../assets/icon.png" />
        </div>
        <div class="app-label">냉장고 박사</div>
      </div>
      <div class="icon-case">
        <div class="squircle" style="width:72px;height:72px;background:#FF3B30;">
          <img class="icon-img" src="../assets/icon.png" style="opacity:0.3;" />
        </div>
        <div class="app-label">다른 앱</div>
      </div>
      <div class="icon-case">
        <div class="squircle" style="width:72px;height:72px;background:#34C759;">
          <img class="icon-img" src="../assets/icon.png" style="opacity:0.3;" />
        </div>
        <div class="app-label">다른 앱</div>
      </div>
    </div>
  </div>

</body>
</html>
